services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: frontend_odoo:latest
    container_name: frontend_odoo
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Opcional: fallback caso usuário acesse API sem cookie de login.
      # Em multi-tenant pode remover — login define a URL via cookie/localStorage.
      # ODOO_URL: ${ODOO_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
